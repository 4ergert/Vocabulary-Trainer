<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App</title>

  <link rel="shortcut icon" href="./img/ship.svg" type="image/x-icon">
  <link rel="stylesheet" href="./style/assets.css">
  <link rel="stylesheet" href="./style/standart.css">
  <link rel="stylesheet" href="./style.css">

  <script src="./js/vocabulary_db.js"></script>
  <script src="./js/template.js"></script>
  <script src="./script.js"></script>

  <!-- font links -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Play:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
  <header class="header">
    <h1>Vocabulary Trainer</h1>
  </header>

  <main class="main">
    <section id="invaderMustDie" class="invaderMustDie">

      <div>
        <section class="invader">
          <img src="./img/boss.png" width="100px" alt="invader">
          <p id="invaderHP"></p>
        </section>
        <section class="rightAnswer">
          <p id="rightAnswer"></p>
        </section>
      </div>

      <section class="shoot_space">
        <div id="invaderShoot"></div>
        <!-- space between -->
        <p id="message"></p>
        <!-- space between -->
        <div id="spaceShipShoot"></div>
      </section>

      <section class="space_ship" id="spaceShipSection">
        <p id="spaceShipLVL"></p>
        <img src="./img/spaceship.png" width="100px" alt="Space Ship">
        <p id="spaceShipHP"></p>
      </section>

    </section>

    <section class="vocabulary">

      <p id="germanQuestion" class="german_word">
        Was heißt "<span id="germanWord"></span>" auf english?
      </p>

      <section class="submit_and_menu">
        <section id="submitSection" class="submit_section">
          <input id="englishWord" class="input" type="text" placeholder="..........." required>
          <button class="submit_button" onclick="submitAnswer()">submit</button>
        </section>
        <section class="menu">
          <button class="menu_button" onclick="showMenu()">☰</button>
        </section>

      </section>
    </section>

  </main>

  <footer class="footer">
    <p>&#169 Julian Aergert</p>
  </footer>

  <dialog id="menuDialog">
    <h2>Menu</h2>
    <section class="input_space">
      <label for="name">Name</label>
      <button id="liamVocabulary" onclick="selectName('liam')" type="button">Liam</button>
      <button id="aliaVocabulary" onclick="selectName('alia')" type="button">Alia</button>
      <label for="vocabulary block">Vocabulary</label>
      <button id="block1" onclick="selectBlock('block1')" type="button">Block 1</button>
      <button id="block2" onclick="selectBlock('block2')" type="button">Block 2</button>
      <label for="ready">Ready</label>
      <button id="readyButton" onclick="init()" type="button">Start</button>
      <button id="showVocabulary" onclick="showVocabulary()" type="button">show vocabulary</button>
      <button id="addVocabulary" onclick="addVocabulary()" type="button">Add Vocabulary</button>
    </section>
  </dialog>
</body>

</html>
